<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-team" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad-team)" />
  
  <!-- Group of styled people avatars -->
  <!-- Left person -->
  <circle cx="140" cy="130" r="25" fill="#60a5fa" />
  <path d="M 100 200 C 100 170, 180 170, 180 200 Z" fill="#3b82f6" />
  
  <!-- Right person -->
  <circle cx="260" cy="130" r="25" fill="#f472b6" />
  <path d="M 220 200 C 220 170, 300 170, 300 200 Z" fill="#ec4899" />
  
  <!-- Center person (Leader - taller) -->
  <circle cx="200" cy="110" r="30" fill="#fbbf24" />
  <path d="M 150 190 C 150 150, 250 150, 250 190 Z" fill="#f59e0b" />
  <path d="M 180 60 L 190 45 L 200 52 L 210 45 L 220 60 Z" fill="#fbbf24" />
  
  <text x="200" y="240" fill="#fbbf24" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="24" text-anchor="middle">100+ Volunteers</text>
  <text x="200" y="270" fill="#ffffff" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="12" text-anchor="middle">Logistical &amp; Operational Leadership</text>
</svg>
