<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-rang" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b91c1c" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad-rang)" />
  
  <!-- Theater masks / drama curtains -->
  <!-- Left curtain -->
  <path d="M 0 0 C 40 40, 60 100, 40 220 L 0 220 Z" fill="#991b1b" />
  <!-- Right curtain -->
  <path d="M 400 0 C 360 40, 340 100, 360 220 L 400 220 Z" fill="#991b1b" />
  
  <!-- Smiling mask -->
  <g transform="translate(140, 100)" fill="none" stroke="#fecaca" stroke-width="2">
    <rect x="0" y="0" width="50" height="70" rx="25" fill="#f87171" stroke="#fecaca" />
    <!-- Eyes -->
    <ellipse cx="15" cy="25" rx="3" ry="5" fill="#7f1d1d" stroke="none" />
    <ellipse cx="35" cy="25" rx="3" ry="5" fill="#7f1d1d" stroke="none" />
    <!-- Smile -->
    <path d="M 12 45 Q 25 58, 38 45" fill="none" stroke="#7f1d1d" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- Frowning mask -->
  <g transform="translate(210, 110)" fill="none" stroke="#fecaca" stroke-width="2">
    <rect x="0" y="0" width="50" height="70" rx="25" fill="#ef4444" stroke="#fecaca" />
    <!-- Eyes -->
    <ellipse cx="15" cy="25" rx="3" ry="5" fill="#7f1d1d" stroke="none" />
    <ellipse cx="35" cy="25" rx="3" ry="5" fill="#7f1d1d" stroke="none" />
    <!-- Frown -->
    <path d="M 15 50 Q 25 40, 35 50" fill="none" stroke="#7f1d1d" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <text x="200" y="270" fill="#ffffff" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="12" text-anchor="middle">RangManch - Full Stack &amp; Ops Intern</text>
</svg>
