      <stop offset="0%" stop-color="#065f46" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad-spons)" />
  
  <!-- Financial growth chart -->
  <path d="M 50 220 Q 150 180, 250 100 T 350 50" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" />
