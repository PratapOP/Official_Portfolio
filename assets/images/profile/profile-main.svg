<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-profile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50" />
      <stop offset="50%" stop-color="#1a252f" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e74c3c" />
      <stop offset="100%" stop-color="#c0392b" />
    </linearGradient>
    <linearGradient id="grad-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(231,76,60,0.5)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="200" cy="190" r="130" />
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#grad-profile)" />
  <circle cx="200" cy="190" r="135" fill="url(#grad-accent)" opacity="0.8" />
  
  <!-- Avatar Base -->
  <g clip-path="url(#circle-clip)">
    <!-- Background inside circle -->
    <rect x="50" y="50" width="300" height="300" fill="#1e272e" />
    
    <!-- Code patterns in background -->
    <text x="100" y="120" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.05)">&lt;developer&gt;</text>
    <text x="240" y="150" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.05)">const AI = true;</text>
    <text x="80" y="240" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.05)">model.train();</text>
    <text x="220" y="260" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.05)">return impact;</text>

    <!-- Glowing circuit lines -->
    <path d="M 100 190 L 170 190 L 200 220" stroke="rgba(231,76,60,0.2)" stroke-width="2" fill="none" />
    <path d="M 300 190 L 230 190 L 200 220" stroke="rgba(231,76,60,0.2)" stroke-width="2" fill="none" />
    <circle cx="200" cy="220" r="4" fill="#e74c3c" opacity="0.5" />
    
    <!-- Body/Shoulders -->
    <path d="M 100 340 C 100 280, 300 280, 300 340 Z" fill="#2d3748" />
    <path d="M 140 340 C 140 295, 260 295, 260 340 Z" fill="url(#grad-accent)" />
    
    <!-- Neck -->
    <rect x="185" y="225" width="30" height="40" rx="5" fill="#fbc531" />
    
    <!-- Head -->
    <circle cx="200" cy="180" r="50" fill="#fbc531" />
    
    <!-- Hair -->
    <path d="M 145 180 C 145 120, 255 120, 255 180 C 240 160, 210 160, 200 165 C 190 160, 160 160, 145 180 Z" fill="#2c3e50" />
    <rect x="150" y="170" width="10" height="25" rx="2" fill="#2c3e50" />
    <rect x="240" y="170" width="10" height="25" rx="2" fill="#2c3e50" />

    <!-- Glasses (represents geeky/AI builder profile) -->
    <rect x="165" y="175" width="25" height="15" rx="3" stroke="#2c3e50" stroke-width="3" fill="rgba(255,255,255,0.2)" />
    <rect x="210" y="175" width="25" height="15" rx="3" stroke="#2c3e50" stroke-width="3" fill="rgba(255,255,255,0.2)" />
    <line x1="190" y1="180" x2="210" y2="180" stroke="#2c3e50" stroke-width="3" />
    
    <!-- Smile -->
    <path d="M 190 210 Q 200 218, 210 210" stroke="#2c3e50" stroke-width="3" fill="none" stroke-linecap="round" />
  </g>
  
  <!-- Overlay text/glow -->
  <rect x="120" y="310" width="160" height="30" rx="15" fill="#1e272e" opacity="0.9" stroke="url(#grad-accent)" stroke-width="1.5" />
  <text x="200" y="329" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="12" fill="#ffffff" text-anchor="middle" letter-spacing="1">ABHIUDAY P. SINGH</text>
</svg>
