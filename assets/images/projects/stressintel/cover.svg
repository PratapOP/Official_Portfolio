<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  
  <!-- Grid overlay -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400 M 0 450 L 800 450" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 100 0 L 100 500 M 200 0 L 200 500 M 300 0 L 300 500 M 400 0 L 400 500 M 500 0 L 500 500 M 600 0 L 600 500 M 700 0 L 700 500" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- UI Frame Mockup -->
  <rect x="50" y="50" width="700" height="400" rx="12" fill="#1e293b" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  
  <!-- Browser top bar -->
  <rect x="50" y="50" width="700" height="40" rx="12" fill="#0f172a" />
  <circle cx="75" cy="70" r="6" fill="#ef4444" />
  <circle cx="95" cy="70" r="6" fill="#f59e0b" />
  <circle cx="115" cy="70" r="6" fill="#10b981" />
  <text x="400" y="75" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">StressIntel PRO - Explainable AI Diagnostics</text>

  <!-- Left Section (OpenCV Camera) -->
  <rect x="80" y="110" width="280" height="280" rx="8" fill="#020617" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <!-- Target face grid -->
  <circle cx="220" cy="230" r="70" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="8 4" />
  <!-- Eye reticles -->
  <circle cx="195" cy="210" r="10" stroke="#10b981" stroke-width="1.5" fill="none" />
  <circle cx="245" cy="210" r="10" stroke="#10b981" stroke-width="1.5" fill="none" />
  <!-- Face mesh dots -->
  <circle cx="220" cy="170" r="3" fill="#10b981" />
  <circle cx="220" cy="265" r="3" fill="#10b981" />
  <circle cx="155" cy="230" r="3" fill="#10b981" />
  <circle cx="285" cy="230" r="3" fill="#10b981" />
  <path d="M 195 210 L 220 230 L 245 210" stroke="rgba(16,185,129,0.5)" stroke-width="1" fill="none" />
  <text x="95" y="135" fill="#ef4444" font-family="monospace" font-size="10" font-weight="bold">● LIVE FEED</text>
  <text x="350" y="135" fill="#10b981" font-family="monospace" font-size="10" text-anchor="end">BLINK RATE: 14/MIN</text>

  <!-- Right Section (SHAP / Interpretability Charts) -->
  <rect x="380" y="110" width="340" height="280" rx="8" fill="#0b0f19" />
  <text x="400" y="135" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">SHAP Feature Attribution</text>
  
  <!-- SHAP Bars -->
  <!-- Bar 1 -->
  <text x="400" y="175" fill="#94a3b8" font-family="sans-serif" font-size="11">Heart Rate Variability</text>
  <rect x="530" y="165" width="120" height="12" rx="3" fill="#ef4444" />
  <text x="660" y="175" fill="#ef4444" font-family="monospace" font-weight="bold" font-size="11">+0.28</text>
  
  <!-- Bar 2 -->
  <text x="400" y="215" fill="#94a3b8" font-family="sans-serif" font-size="11">Blink Frequency</text>
  <rect x="530" y="205" width="80" height="12" rx="3" fill="#ef4444" />
  <text x="620" y="215" fill="#ef4444" font-family="monospace" font-weight="bold" font-size="11">+0.16</text>

  <!-- Bar 3 -->
  <text x="400" y="255" fill="#94a3b8" font-family="sans-serif" font-size="11">Micro-Expressions</text>
  <rect x="490" y="245" width="40" height="12" rx="3" fill="#10b981" />
  <text x="445" y="255" fill="#10b981" font-family="monospace" font-weight="bold" font-size="11">-0.09</text>

  <!-- Bar 4 -->
  <text x="400" y="295" fill="#94a3b8" font-family="sans-serif" font-size="11">Speech Jitter</text>
  <rect x="530" y="285" width="50" height="12" rx="3" fill="#ef4444" />
  <text x="590" y="295" fill="#ef4444" font-family="monospace" font-weight="bold" font-size="11">+0.11</text>

  <!-- Diagnostic Result Summary -->
  <rect x="400" y="330" width="300" height="45" rx="6" fill="#1e293b" stroke="rgba(239,68,68,0.2)" stroke-width="1" />
  <text x="415" y="357" fill="#ffffff" font-family="sans-serif" font-size="12">STRESS INDEX SCORE:</text>
  <text x="685" y="358" fill="#ef4444" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="end">78.5% (HIGH)</text>
</svg>
