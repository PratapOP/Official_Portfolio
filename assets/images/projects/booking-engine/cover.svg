<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-bk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#083344" />
      <stop offset="100%" stop-color="#02141a" />
    </linearGradient>
    <linearGradient id="accent-grad-bk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad-bk)" />
  
  <!-- UI Frame Mockup -->
  <rect x="50" y="50" width="700" height="400" rx="12" fill="#0f172a" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
  
  <!-- Browser top bar -->
  <rect x="50" y="50" width="700" height="40" rx="12" fill="#020617" />
  <circle cx="75" cy="70" r="6" fill="#ef4444" />
  <circle cx="95" cy="70" r="6" fill="#f59e0b" />
  <circle cx="115" cy="70" r="6" fill="#10b981" />
  <text x="400" y="75" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Enterprise Booking Engine - Transaction Terminal</text>

  <!-- Left Side: Dashboard & Revenue Chart -->
  <rect x="80" y="110" width="310" height="280" rx="8" fill="#1e293b" />
  <text x="100" y="135" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">Transactional Overview</text>
  
  <!-- Bar chart representing volume -->
  <g transform="translate(100, 160)">
    <line x1="0" y1="120" x2="260" y2="120" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <rect x="20" y="40" width="25" height="80" fill="url(#accent-grad-bk)" rx="4" />
    <rect x="65" y="10" width="25" height="110" fill="url(#accent-grad-bk)" rx="4" />
    <rect x="110" y="60" width="25" height="60" fill="url(#accent-grad-bk)" rx="4" />
    <rect x="155" y="30" width="25" height="90" fill="url(#accent-grad-bk)" rx="4" />
    <rect x="200" y="5" width="25" height="115" fill="url(#accent-grad-bk)" rx="4" />
    <text x="32" y="135" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">Jan</text>
    <text x="77" y="135" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">Feb</text>
    <text x="122" y="135" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">Mar</text>
    <text x="167" y="135" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">Apr</text>
    <text x="212" y="135" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">May</text>
  </g>

  <!-- Right Side: Database Transaction rollback flow -->
  <rect x="410" y="110" width="310" height="280" rx="8" fill="#111827" />
  <text x="430" y="135" fill="#10b981" font-family="sans-serif" font-size="13" font-weight="bold">ACID Checkpoint Safety</text>

  <!-- Flow chart blocks -->
  <rect x="430" y="160" width="270" height="40" rx="6" fill="#1e293b" stroke="rgba(255,255,255,0.05)" />
  <text x="445" y="184" fill="#ffffff" font-family="monospace" font-size="10">1. START TRANSACTION (Isolation: RR)</text>

  <rect x="430" y="220" width="270" height="40" rx="6" fill="#1e293b" stroke="rgba(255,255,255,0.05)" />
  <text x="445" y="244" fill="#ffffff" font-family="monospace" font-size="10">2. SELECT FOR UPDATE (Locking row)</text>

  <rect x="430" y="280" width="270" height="40" rx="6" fill="#1e293b" stroke="rgba(255,255,255,0.05)" />
  <text x="445" y="304" fill="#ffffff" font-family="monospace" font-size="10">3. UPDATE checkouts SET status='booked'</text>

  <rect x="430" y="340" width="270" height="40" rx="6" fill="#10b981" opacity="0.9" />
  <text x="445" y="364" fill="#0f172a" font-family="monospace" font-weight="bold" font-size="11">4. COMMIT TRANSACTION (SUCCESS)</text>
</svg>
