<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-bk-ss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad-bk-ss)" />
  
  <rect x="40" y="40" width="720" height="420" rx="8" fill="#0b0f19" stroke="rgba(255,255,255,0.05)" />
  <text x="70" y="80" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">Database Concurrent Transaction Isolation Logs</text>
  
  <rect x="70" y="110" width="660" height="310" rx="6" fill="#020617" />
  
  <!-- Log lines -->
  <text x="90" y="145" fill="#64748b" font-family="monospace" font-size="11">[2026-06-08 14:02:11] [INFO] Initiating multi-channel transaction checkout...</text>
  <text x="90" y="175" fill="#38bdf8" font-family="monospace" font-size="11">[2026-06-08 14:02:11] [MYSQL] Acquired shared Read Lock on products (id: 4212)</text>
  <text x="90" y="205" fill="#38bdf8" font-family="monospace" font-size="11">[2026-06-08 14:02:11] [MYSQL] Acquired exclusive Write Lock on bookings (row: pending)</text>
  
  <!-- Conflict occurred and resolved -->
  <text x="90" y="235" fill="#f59e0b" font-family="monospace" font-size="11">[2026-06-08 14:02:12] [WARN] Connection collision detected for user_session: 9a2f. Retrying...</text>
  <text x="90" y="265" fill="#38bdf8" font-family="monospace" font-size="11">[2026-06-08 14:02:12] [MYSQL] Retrying query with rollback savepoint SP_1...</text>
  
  <!-- Success -->
  <text x="90" y="295" fill="#10b981" font-family="monospace" font-size="11">[2026-06-08 14:02:13] [SUCCESS] Transaction completed successfully. 1 row affected.</text>
  <text x="90" y="325" fill="#10b981" font-family="monospace" font-size="11">[2026-06-08 14:02:13] [SUCCESS] Dispatched API webhook receipt payload to logistics hub.</text>

  <!-- Status indicators -->
  <line x1="70" y1="360" x2="730" y2="360" stroke="rgba(255,255,255,0.05)" />
  <text x="90" y="395" fill="#94a3b8" font-family="sans-serif" font-size="12">ACID Compliance: VERIFIED</text>
  <text x="400" y="395" fill="#94a3b8" font-family="sans-serif" font-size="12">Response latency: 45ms</text>
  <text x="710" y="395" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="end">STATUS: SECURE</text>
</svg>
