<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-gpt-ss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad-gpt-ss)" />
  
  <rect x="40" y="40" width="720" height="420" rx="8" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
  <text x="70" y="80" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">RAG Pipeline - FAISS Vector Index Mapping</text>
  <text x="70" y="105" fill="#94a3b8" font-family="sans-serif" font-size="12">Retrieval accuracy visualization of candidate resumes mapped to targeted job profiles.</text>

  <!-- Vector Database Clusters -->
  <g transform="translate(150, 260)">
    <!-- Grid -->
    <path d="M -80 0 L 80 0 M 0 -80 L 0 80" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
    <circle cx="0" cy="0" r="80" stroke="rgba(255,255,255,0.05)" fill="none" stroke-dasharray="4 4" />
    <circle cx="0" cy="0" r="40" stroke="rgba(255,255,255,0.05)" fill="none" stroke-dasharray="4 4" />
    <!-- Cluster dots -->
    <circle cx="-30" cy="-20" r="6" fill="#8b5cf6" opacity="0.8" />
    <circle cx="-45" cy="-35" r="4" fill="#8b5cf6" opacity="0.6" />
    <circle cx="-15" cy="-40" r="5" fill="#8b5cf6" opacity="0.7" />
    <circle cx="40" cy="50" r="6" fill="#d946ef" opacity="0.8" />
    <circle cx="55" cy="35" r="4" fill="#d946ef" opacity="0.6" />
    <circle cx="25" cy="60" r="5" fill="#d946ef" opacity="0.7" />
    <!-- Selected node -->
    <circle cx="10" cy="-10" r="8" fill="#10b981" />
    <circle cx="10" cy="-10" r="14" fill="none" stroke="#10b981" stroke-width="1.5">
      <animate attributeName="r" values="8;18;8" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="18" y="-18" fill="#10b981" font-family="sans-serif" font-size="10" font-weight="bold">Target Profile Match</text>
  </g>

  <!-- Flowchart representation -->
  <g transform="translate(380, 150)">
    <rect x="0" y="0" width="310" height="240" rx="6" fill="#1e293b" />
    <text x="20" y="30" fill="#a78bfa" font-family="sans-serif" font-size="13" font-weight="bold">Similarity Metric Logs</text>
    
    <text x="20" y="70" fill="#e2e8f0" font-family="monospace" font-size="11">QUERY: "How to handle state caching?"</text>
    
    <rect x="20" y="90" width="270" height="40" rx="4" fill="#090d16" />
    <text x="30" y="114" fill="#10b981" font-family="monospace" font-size="10">Match #1: cache_utils.py (Cosine: 0.887)</text>

    <rect x="20" y="140" width="270" height="40" rx="4" fill="#090d16" />
    <text x="30" y="164" fill="#94a3b8" font-family="monospace" font-size="10">Match #2: state_manager.js (Cosine: 0.742)</text>

    <rect x="20" y="190" width="270" height="30" rx="4" fill="#090d16" />
    <text x="30" y="209" fill="#64748b" font-family="monospace" font-size="10">Match #3: index.tsx (Cosine: 0.612)</text>
  </g>
</svg>
