<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-gpt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="accent-grad-gpt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad-gpt)" />
  
  <!-- UI Frame Mockup -->
  <rect x="50" y="50" width="700" height="400" rx="12" fill="#0f172a" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
  
  <!-- Browser top bar -->
  <rect x="50" y="50" width="700" height="40" rx="12" fill="#020617" />
  <circle cx="75" cy="70" r="6" fill="#ef4444" />
  <circle cx="95" cy="70" r="6" fill="#f59e0b" />
  <circle cx="115" cy="70" r="6" fill="#10b981" />
  <text x="400" y="75" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">InterviewGPT - RAG LLM Interview Prep</text>

  <!-- Chat simulation interface -->
  <rect x="80" y="110" width="640" height="280" rx="8" fill="#1e293b" />
  
  <!-- Left Side: Chat Flow -->
  <!-- Bubble 1 (AI interviewer) -->
  <rect x="100" y="130" width="340" height="60" rx="12" fill="#0f172a" />
  <text x="120" y="152" fill="#8b5cf6" font-family="sans-serif" font-size="11" font-weight="bold">Interviewer (LLM + RAG Context)</text>
  <text x="120" y="172" fill="#94a3b8" font-family="sans-serif" font-size="11">How would you manage race conditions in Next.js Server Actions?</text>

  <!-- Bubble 2 (User candidate response) -->
  <rect x="360" y="205" width="340" height="60" rx="12" fill="url(#accent-grad-gpt)" />
  <text x="380" y="227" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold">Candidate Response</text>
  <text x="380" y="247" fill="#f3e8ff" font-family="sans-serif" font-size="11">I would use relational database transaction locks and optimistic UI updates.</text>

  <!-- Bubble 3 (Real-time Evaluation overlay) -->
  <rect x="100" y="280" width="540" height="90" rx="12" fill="rgba(16,185,129,0.08)" stroke="#10b981" stroke-width="1.5" />
  <text x="120" y="305" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold">✓ Live AI Evaluation</text>
  <text x="120" y="325" fill="#94a3b8" font-family="sans-serif" font-size="11">Technical Accuracy: 92% | Structure: Strong</text>
  <text x="120" y="345" fill="#ffffff" font-family="sans-serif" font-size="11">Feedback: Excellent mention of database transactions. Consider adding idempotency keys for APIs.</text>
</svg>
