<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-res" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    <linearGradient id="accent-grad-res" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad-res)" />
  
  <!-- UI Frame Mockup -->
  <rect x="50" y="50" width="700" height="400" rx="12" fill="#0f172a" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
  
  <!-- Browser top bar -->
  <rect x="50" y="50" width="700" height="40" rx="12" fill="#020617" />
  <circle cx="75" cy="70" r="6" fill="#ef4444" />
  <circle cx="95" cy="70" r="6" fill="#f59e0b" />
  <circle cx="115" cy="70" r="6" fill="#10b981" />
  <text x="400" y="75" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">ResumeAnalyzer-XAI - Explainable Resume Diagnostics</text>

  <!-- Left Side: Uploader & Text parsing -->
  <rect x="80" y="110" width="280" height="280" rx="8" fill="#1e293b" />
  <rect x="110" y="140" width="220" height="130" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-dasharray="6 4" />
  <path d="M 220 180 L 220 220 M 200 200 L 220 180 L 240 200" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <text x="220" y="245" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">Parsed: Resume_Developer.pdf</text>
  
  <!-- Text snippet extracted -->
  <rect x="110" y="290" width="220" height="80" rx="4" fill="#090d16" />
  <text x="120" y="310" fill="#10b981" font-family="monospace" font-size="9">SKILLS MATCHED: Python, PyTorch, React</text>
  <text x="120" y="330" fill="#f59e0b" font-family="monospace" font-size="9">GAPS IDENTIFIED: Kubernetes, AWS</text>
  <text x="120" y="350" fill="#94a3b8" font-family="monospace" font-size="9">ATS FIT SCORE: 84% - Tier 1 Match</text>

  <!-- Right Side: Job category score dial & SHAP metrics -->
  <rect x="380" y="110" width="340" height="280" rx="8" fill="#111827" />
  <!-- Circle dial -->
  <circle cx="550" cy="200" r="50" fill="none" stroke="#1f2937" stroke-width="10" />
  <path d="M 550 150 A 50 50 0 1 1 500 200" fill="none" stroke="url(#accent-grad-res)" stroke-width="10" stroke-linecap="round" />
  <text x="550" y="206" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">84%</text>
  
  <!-- ATS details -->
  <text x="400" y="290" fill="#94a3b8" font-family="sans-serif" font-size="12">Rank: #4 of 142 Applicants</text>
  <text x="400" y="315" fill="#94a3b8" font-family="sans-serif" font-size="12">Keywords Overlap: High</text>
  <text x="400" y="340" fill="#94a3b8" font-family="sans-serif" font-size="12">Domain Affinity: Machine Learning</text>
</svg>
